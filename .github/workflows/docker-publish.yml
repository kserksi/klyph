name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
      - "V*.*.*"

  workflow_dispatch:
    inputs:
      version:
        description: Optional image tag, for example V1.0.0
        required: false
        type: string


permissions:
  contents: read


concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false


env:
  IMAGE_NAME: jaykserks/klyph


jobs:

  publish:
    name: Build and push Docker image
    runs-on: ubuntu-latest


    steps:

      - name: Check out repository
        uses: actions/checkout@v6


      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4


      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}

          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=sha,prefix=sha-

          labels: |
            org.opencontainers.image.title=Klyph
            org.opencontainers.image.description=Deterministic, self-hosted web-font subsetting service
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.revision=${{ github.sha }}


      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true

          platforms: |
            linux/amd64
            linux/arm64

          tags: |
            ${{ steps.meta.outputs.tags }}

          labels: |
            ${{ steps.meta.outputs.labels }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          provenance: mode=max
          sbom: true


      # 同步 GitHub README.md 到 Docker Hub Overview
      - name: Sync README to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}



  release:

    name: Reconcile GitHub release

    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'

    needs: publish

    permissions:
      contents: write


    runs-on: ubuntu-latest


    steps:


      - name: Check out repository and tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0



      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="$(git describe --tags --abbrev=0)"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"



      - name: Create release with generated notes when missing
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}

        shell: bash

        run: |

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi


          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --generate-notes \
            --title "Klyph $RELEASE_TAG"
